<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>River Raid</title>
  <link href="https://fonts.cdnfonts.com/css/zx-spectrum-7" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-fork-ribbon-css/0.2.3/gh-fork-ribbon.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading {
      color: #c5c5c5;
      font-family: 'ZX Spectrum-7', monospace;
      font-size: 4vw;
      text-align: center;
      white-space: nowrap;
    }

    .github-fork-ribbon:before {
      background-color: #e06000;
    }
  </style>
</head>
<body>
  <div class="loading">LOADING...</div>
  <a class="github-fork-ribbon fixed" href="https://github.com/river-raid/river-raid-ebiten" data-ribbon="Fork me on GitHub" title="Fork me on GitHub" target="_blank" rel="noopener">Fork me on GitHub</a>
  <script src="wasm_exec.js"></script>
  <script>
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("river-raid.wasm"), go.importObject).then(result => {
      document.querySelector('.loading').style.display = 'none';
      go.run(result.instance);
    });
  </script>
</body>
</html>
